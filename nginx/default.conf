server {
    listen 80;
    listen unix:/var/run/pan-search/app.sock;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # fnOS 统一网关入口。网关会将 /app/third-pan-search 转发到 app.sock。
    location = /app/third-pan-search {
        return 301 /app/third-pan-search/;
    }

    location ^~ /app/third-pan-search/api/ {
        rewrite ^/app/third-pan-search(/api/.*)$ $1 break;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location ^~ /app/third-pan-search/ {
        rewrite ^/app/third-pan-search(/.*)$ $1 break;
        try_files $uri $uri/ /index.html;
    }

    # 前端 SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # 静态资源缓存
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

services:
  pan-search:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-docker.1ms.run/library/node:20-alpine}
        PYTHON_IMAGE: ${PYTHON_IMAGE:-docker.1ms.run/library/python:3.12-slim}
    container_name: pan-search
    restart: unless-stopped
    ports:
      - "${PORT:-8899}:80"
    volumes:
      - /var/apps/third-pan-search/shares/third-pan-search/data:/app/data
      - /var/apps/third-pan-search/target:/var/run/pan-search
    environment:
      TZ: Asia/Shanghai
      PANSEARCH_DATA_DIR: /app/data
      PANSEARCH_CACHE_TTL: "300"
    logging:
      options:
        max-size: 10m
        max-file: "3"
